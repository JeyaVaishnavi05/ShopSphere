<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styles/theme.css">
</head>

<body>

<header class="navbar">

<div class="logo">ShopSphere</div>

<nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart 🛒</a>

<button class="dark-toggle" onclick="toggleDarkMode()">
🌙
</button>

</nav>

</header>

<main class="checkout-container">

<h2>Checkout</h2>

<div class="checkout-grid">

<!-- Customer Details -->
<div class="checkout-form">

<h3>Customer Details</h3>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="address" placeholder="Shipping Address">

<input type="text" id="phone" placeholder="Phone Number">

<button onclick="placeOrder()" class="order-btn">
Place Order
</button>

</div>


<!-- Order Summary -->
<div class="order-summary">

<h3>Order Summary</h3>

<div id="order-items"></div>

<h3>Total: ₹<span id="order-total">0</span></h3>

</div>

</div>

</main>

<script src="checkout.js"></script>

</body>
<footer class="footer">

<p>© 2026 ShopSphere. All rights reserved.</p>

</footer>
</html>
